apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpath-web
  labels:
    app: devpath-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devpath-web
  template:
    metadata:
      labels:
        app: devpath-web
    spec:
      containers:
        - name: devpath-web
          # 이미지 태그는 ArgoCD Image Updater 또는 CI가 교체한다.
          image: ghcr.io/devpathai/devpath-web:main
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
